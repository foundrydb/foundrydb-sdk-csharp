name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v1.2.3)'
        required: true

jobs:
  publish:
    name: Build and publish FoundryDB.SDK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Derive version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION"

      - name: Pack library
        # Passes the version via MSBuild property — no source-file edits needed.
        # Only the library project is packed; test and example projects are excluded.
        run: >
          dotnet pack FoundryDB.SDK/FoundryDB.SDK.csproj
          -c Release
          -p:Version="$VERSION"
          -o ./artifacts

      - name: Publish to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
